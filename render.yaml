databases:
  - name: keops-studios-db
    databaseName: keops_studios
    user: keops

services:
  - type: web
    name: keops-studios-web-site
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: BASE_PATH
        value: /
      - key: NODE_ENV
        value: production
      - key: PRIVATE_OBJECT_DIR
        value: /tmp/keops-private
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        value: /tmp/keops-public
      - key: DATABASE_URL
        fromDatabase:
          name: keops-studios-db
          property: connectionString